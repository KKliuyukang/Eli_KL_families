<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KL 2026 family board</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="page-header">
        <div class="title-block">
          <h1>KL 2026 family board</h1>
          <p>
            快速认出孩子和对应父母，照片、名字和备注可以逐步补充，不用一次填完。
          </p>
        </div>
        <div class="toolbar">
          <label class="search-field">
            <span class="sr-only">搜索家庭</span>
            <input id="search-input" type="search" placeholder="搜索孩子、父母、备注" />
          </label>
          <button id="add-family-button" class="action-button" type="button">添加家庭</button>
        </div>
      </header>

      <main class="content-shell">
        <section class="grid-shell">
          <div id="family-grid" class="family-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <div id="family-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div id="modal-content"></div>
      </section>
    </div>

    <div id="image-lightbox" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-lightbox="true"></div>
      <section class="lightbox-card" role="dialog" aria-modal="true" aria-label="图片预览">
        <button
          type="button"
          class="modal-button close-button lightbox-close"
          data-close-lightbox="true"
          aria-label="关闭"
        >
          ×
        </button>
        <img id="lightbox-image" src="" alt="" />
      </section>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
  </html>
